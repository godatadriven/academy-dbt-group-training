sources:
  - name: stripe
    schema: stripe
    tables:
      - name: payments
        identifier: payments
        columns: 
          - name: payment_id
            data_tests:
              - not_null
              - unique
          - name: order_id
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: ref('stg_jaffle_shop_orders')
                    field: order_id
          - name: payment_method
            data_tests:
              - accepted_values: 
                  arguments:
                    values: 
                      - credit_card
                      - coupon
                      - bank_transfer
                      - gift_card