models:
  - name: stg_jaffle_shop_orders
    description: One row represents one order
    columns: 
      - name: order_status
        description: This says the current status of the order
        data_tests:
          - accepted_values: 
              arguments:
                values: 
                  - completed
                  - returned
                  - pending
                  - placed
                  - shipped
                  - return_pending