models:
  - name: stg_jaffle_shop_orders
    columns:
      - name: orderstatus
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - returned
                  - pending
                  - placed
                  - shipped
                  - return_pending
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_customers')
                field: customer_id                    