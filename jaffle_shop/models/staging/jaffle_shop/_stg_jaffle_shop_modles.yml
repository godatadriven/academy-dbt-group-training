models:
  - name: stg_jaffle_shop_customers
    description: One record is one customer
    columns: 
      - name: customer_id
        description: This is the primary key
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop_orders
    description: One record is one order
    columns: 
      - name: order_id
        description: This is the primary key
        data_tests:
          - unique
          - not_null
      
      - name: customer_id
        description: This is the foreign key for the customer table
        data_tests:     
          - relationships:
             arguments:
              to: ref('stg_jaffle_shop_customers')
              field: customer_id
                 
      - name: order_status
        description: "{{doc('order_status')}}"
        data_tests:
          - accepted_values:
             arguments:
              values:
                 - completed
                 - shipped
                 - returned
                 - placed
                 - return_pending
