sources:
  - name: jaffle_shop
    schema: raw_jaffle_shop
    tables:
      - name: orders # alias of the table name
        identifier: orders # reference the exact name in the warehouse
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
          - name: status
            data_tests:
              - accepted_values:
                  arguments:
                    values: 
                      - completed
                      - shipped
                      - returned
                      - placed
                      - return_pending
      - name: customers
        identifier: customers
        columns:
          - name: id
            data_tests:
              - unique:
                  config:                     
                     severity: error
                     warn_if: ">1"
                     error_if: ">10"
                     store_failures: true
              - not_null        