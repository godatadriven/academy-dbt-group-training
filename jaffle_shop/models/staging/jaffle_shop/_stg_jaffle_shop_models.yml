models:
  - name: stg_jaffle_shop_customers
    description: one record is one customer
    columns:
      - name: customer_id
        description: this is the primary key
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop_orders
    description: one record is one customer
    columns:
      - name: order_id
        description: this is the primary key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: this is the ordering customer
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_customers')
                field: customer_id
      - name: order_status
        description: this is the status of the order
        data_tests:
          - accepted_values:
              arguments:
                values: 
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
                