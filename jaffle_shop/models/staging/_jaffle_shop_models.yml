models:
  - name: stg_jaffle_shop_orders
    columns: 
      - name: order_status
        data_tests:
          - accepted_values: 
              arguments:
                values: 
                  - completed
                  - returned
                  - pending
                  - placed
                  - shipped
                  - return_pending
  - name: stg_stripe_payments
    columns: 
      - name: payment_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_orders')
                field: order_id
      - name: payment_method
        data_tests:
          - accepted_values: 
              arguments:
                values: 
                  - credit_card
                  - coupon
                  - bank_transfer
                  - gift_card