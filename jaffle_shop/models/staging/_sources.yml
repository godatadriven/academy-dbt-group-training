version: 2

sources:
  - name: jaffle_shop
    description: >
      Raw data from the Jaffle Shop application, loaded into the warehouse as
      seeds and landed in the dedicated `raw_jaffle_shop` schema.
    schema: raw_jaffle_shop
    tables:
      - name: customers
        description: One record per customer of the Jaffle Shop.
        columns:
          - name: id
            description: Primary key - unique identifier for each customer.
            tests:
              - unique
              - not_null

      - name: orders
        description: One record per order placed by a customer.
        loaded_at_field: _ETL_LOADED_AT
        config:
          freshness:
            warn_after: {count: 12, period: hour}
        columns:
          - name: id
            description: Primary key - unique identifier for each order.
            tests:
              - unique
              - not_null

      - name: payments
        description: One record per payment made against an order.
        columns:
          - name: id
            description: Primary key - unique identifier for each payment.
            tests:
              - unique
              - not_null
