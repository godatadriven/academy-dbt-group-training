models:
  - name: dim_customers
    description: "The dimension table for customers."
    columns:
      - name: customer_id
        description: "The unique identifier for each customer."
        data_tests:
          - unique:
              config:                     
                 severity: error
                 warn_if: ">1"
                 error_if: ">10"
                 store_failures: true
          - not_null
      - name: first_name
        description: "The customer's first name."
      - name: last_name
        description: "The customer's last name."
      - name: email
        description: "The customer's email address."
      - name: first_order_date
        description: "The date of the customer's first order."
      - name: most_recent_order_date
        description: "The date of the customer's most recent order."
      - name: number_of_orders
        description: "The total number of orders placed by the customer."
      - name: number_of_payments
        description: "The total number of payments made by the customer."
      - name: total_amount_paid
        description: "The total amount paid by the customer across all orders."   
      