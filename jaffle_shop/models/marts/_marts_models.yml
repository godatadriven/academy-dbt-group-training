version: 2

models:
  - name: fct_orders
    description: ""
    columns:
      - name: order_id
        data_type: bigint
        description: ""
        data_tests:
          - not_null
          - unique

      - name: customer_id
        data_type: bigint
        description: ""
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        data_type: date
        description: ""

      - name: order_status
        data_type: string
        description: ""

      - name: amount
        data_type: bigint
        description: ""
        data_tests:
          - dbt_utils.not_constant