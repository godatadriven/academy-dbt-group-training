# dbt connection profile for the training.
#
# This project runs entirely on DuckDB — an embedded database stored in a single
# local file inside your codespace. There are NO credentials, tokens or cloud
# warehouses to configure: everything works out of the box.
#
# This file is copied to ~/.dbt/profiles.yml when the codespace is built.
duckdb_dev:
  target: dev
  outputs:
    dev:
      type: duckdb
      # The database lives in one file at the root of the dbt project
      # (jaffle_shop/jaffle_shop.duckdb). The path is relative to the directory
      # you run dbt from, so always run dbt from inside the jaffle_shop folder.
      path: jaffle_shop.duckdb
      # Schema your own models build into. Override with DBT_SCHEMA if you want
      # an isolated schema (e.g. to compare your work with a colleague's).
      schema: "{{ env_var('DBT_SCHEMA', 'dbt_dev') }}"
      threads: 4
