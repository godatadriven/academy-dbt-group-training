bigquery_dev:
  target: bigquery_dev
  outputs:
    bigquery_dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BQ_DATASET', 'dbt_dev') }}"
      threads: 4
      location: US

databricks_dev:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'dbt_dev') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'hive_metastore') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      threads: 4

snowflake_dev:
  target: snowflake_dev
  outputs:
    snowflake_dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"  
      role: transformer
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'analytics') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'transforming') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'dbt_dev') }}"
      threads: 4
      client_session_keep_alive: False
